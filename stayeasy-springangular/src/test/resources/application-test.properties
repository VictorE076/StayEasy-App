# H2 Database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# H2 console
spring.h2.console.enabled=true

# Session timeout for tests
app.session.timeout-minutes=15

# JWT dummy config for tests
application.security.jwt.secret=ThisIsATestSecretKeyForJwtThatIsLongEnoughForHS256OnlyForTests
application.security.jwt.expiration=3600000

# Gemini dummy config for tests
gemini.api.key=dummy-test-key
gemini.api.url=http://localhost/dummy-gemini-url?key=
